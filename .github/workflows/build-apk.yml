name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp service-worker.js www/service-worker.js

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.xbtds02.textencryptor",
            "appName": "文字隐写工具",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/文字隐写工具-v1.0.0.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          tag_name: v1.0.0
          name: 文字隐写工具 Android APK v1.0.0
          body: |
            文字隐写工具 Android 安装包
            - 基于 Capacitor WebView 打包
            - 功能与网页版完全一致
            - 安装后可在桌面直接打开
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
